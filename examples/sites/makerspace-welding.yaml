# Site: Makerspace — Welding / metal shop zone node
#
# One Pico W per shop zone. Fume extraction, welder outlets, grinding area,
# PN532 RFID at entry for member tracking (access control via HA).
# HA automations should require ventilation ON before welder outlets energize.
#
#   cp examples/sites/makerspace-welding.yaml config.yaml
#
# Sibling zones: makerspace-woodshop.yaml, makerspace-digifab.yaml

device:
  id: makerspace-welding
  board: picow
  profile: sensors
  ha:
    name: "Makerspace Welding"
    manufacturer: mqttpi
    model: picow

mqtt:
  host: 192.168.1.50
  port: 1883
  tls: false
  base_topic: site/makerspace/welding
  client_id: mqttpi-makerspace-welding
  homeassistant:
    discovery: true
    discovery_prefix: homeassistant
  payload_on: "ON"
  payload_off: "OFF"
  retain: true
  qos: 1

buses:
  onewire: { enabled: false, pin: 7 }
  i2c:     { enabled: true, controller: 0, sda: 0, scl: 1 }
  spi:     { enabled: false, controller: 0, sck: 2, mosi: 3, miso: 4, cs: 5 }
  i2s:     { enabled: false, bclk: 16, lrck: 17, din: 18, dout: 19 }

pwm:
  enabled: true
  pins: [8, 9, 10, 11, 12, 13, 14, 15]

mqtt_aliases: {}

sensors:
  rfid:
    enabled: true
    reader:
      type: pn532_i2c
      address: 0x24
      irq_pin: 7
    protocol: iso14443a
    zone: welding
    publish:
      debounce_ms: 800
      retain_last_uid: true
    topics:
      scan: "{base_topic}/rfid/scan"
      last_uid: "{base_topic}/rfid/last_uid/state"
      pair: "{base_topic}/rfid/pair"
    access:
      mode: track
      grant_topic: "{base_topic}/rfid/access/granted"
      deny_topic: "{base_topic}/rfid/access/denied"
      allowed_uids: []
    ha:
      name: "Welding Entry RFID"
    readings:
      last_uid:
        alias: rfid_last_uid
        ha:
          name: "Last Card UID"
          icon: mdi:card-account-details
      scan_count:
        alias: rfid_scan_count
        ha:
          name: "RFID Scan Count"
          state_class: total_increasing
          icon: mdi:counter
      access_granted:
        alias: rfid_access_granted
        type: binary
        ha:
          name: "RFID Access Granted"
          device_class: lock
          icon: mdi:lock-open

pins:
  - pin: 6
    alias: shop_door
    direction: input
    pull: up
    invert: true
    debounce_ms: 50
    ha: { name: "Welding Shop Door", device_class: door }

  - pin: 20
    alias: motion_shop
    direction: input
    pull: down
    debounce_ms: 200
    ha: { name: "Welding Shop Motion", device_class: motion }

  - pin: 21
    alias: fume_extractor
    direction: output
    initial: false
    ha: { name: "Fume Extractor", icon: mdi:air-filter }

  - pin: 22
    alias: make_up_air
    direction: output
    initial: false
    ha: { name: "Make-Up Air Fan", icon: mdi:fan }

  - pin: 2
    alias: welder_outlet_1
    direction: output
    initial: false
    ha: { name: "Welder Outlet 1", icon: mdi:welding }

  - pin: 3
    alias: welder_outlet_2
    direction: output
    initial: false
    ha: { name: "Welder Outlet 2", icon: mdi:welding }

  - pin: 4
    alias: grinding_power
    direction: output
    initial: false
    ha: { name: "Grinding Area Outlet", icon: mdi:angle-grinder }

  - pin: 5
    alias: shop_overhead
    direction: output
    initial: false
    ha: { name: "Overhead Lights", icon: mdi:ceiling-light }

  - pin: 8
    alias: overhead_dim
    direction: pwm_output
    frequency_hz: 1000
    initial_duty: 0
    ha: { name: "Overhead Dimmer", min: 0, max: 100, unit_of_measurement: "%" }

  - pin: 26
    alias: shop_temp
    direction: analog_input
    publish: { interval_ms: 60000 }
    ha:
      name: "Welding Shop Temperature"
      device_class: temperature
      state_class: measurement
      unit_of_measurement: "°C"
      scale: { min: -40.0, max: 85.0 }