# Site: Trailer — door, lights, breakaway, I2C level for campsite setup
#
# Minimal GPIO plus MPU6050 on I2C for pitch/roll leveling in HA.
#
#   cp examples/sites/trailer.yaml config.yaml

device:
  id: trailer-main
  board: picow
  profile: sensors
  ha:
    name: "Trailer"
    manufacturer: mqttpi
    model: picow

mqtt:
  host: 192.168.1.50
  port: 1883
  tls: false
  base_topic: mobile/trailer
  client_id: mqttpi-trailer-main
  homeassistant:
    discovery: true
    discovery_prefix: homeassistant
  payload_on: "ON"
  payload_off: "OFF"
  retain: true
  qos: 1

buses:
  onewire: { enabled: false, pin: 7 }
  i2c:     { enabled: true, controller: 0, sda: 0, scl: 1 }
  spi:     { enabled: false, controller: 0, sck: 2, mosi: 3, miso: 4, cs: 5 }
  i2s:     { enabled: false, bclk: 16, lrck: 17, din: 18, dout: 19 }

pwm:
  enabled: false
  pins: [8, 9, 10, 11, 12, 13, 14, 15]

mqtt_aliases:
  door_contact: entry_door
  breakaway_switch: breakaway_active

sensors:
  level:
    enabled: true
    bus: i2c
    chip: mpu6050
    address: 0x68
    mount: floor_plane
    calibration:
      mode: on_boot
      command_topic: "{base_topic}/level/calibrate"
    publish:
      interval_ms: 3000
      retain: true
    readings:
      pitch:
        alias: level_pitch
        ha:
          name: "Level Pitch"
          state_class: measurement
          unit_of_measurement: "°"
          icon: mdi:angle-acute
      roll:
        alias: level_roll
        ha:
          name: "Level Roll"
          state_class: measurement
          unit_of_measurement: "°"
          icon: mdi:angle-acute
      deviation:
        alias: level_deviation
        type: max_abs
        ha:
          name: "Level Deviation"
          state_class: measurement
          unit_of_measurement: "°"
          icon: mdi:spirit-level
      is_level:
        alias: is_level
        type: binary
        threshold_deg: 2.0
        ha:
          name: "Level OK"
          icon: mdi:check-circle

pins:
  # GP0/1 reserved for I2C level sensor
  - pin: 7
    alias: entry_door
    direction: input
    pull: up
    invert: true
    debounce_ms: 50
    ha: { name: "Entry Door", device_class: door }

  - pin: 22
    alias: breakaway_active
    direction: input
    pull: up
    debounce_ms: 20
    ha: { name: "Breakaway Switch", device_class: safety }

  - pin: 2
    alias: interior_light
    direction: output
    initial: false
    ha: { name: "Interior Light", icon: mdi:lightbulb }

  - pin: 3
    alias: porch_light
    direction: output
    initial: false
    ha: { name: "Porch Light", icon: mdi:coach-lamp }

  - pin: 4
    alias: accent_strip
    direction: output
    initial: false
    ha: { name: "Accent Strip", icon: mdi:led-strip }

  - pin: 6
    alias: propane_detector
    direction: input
    pull: down
    debounce_ms: 200
    ha: { name: "Propane Detector", device_class: gas }

  - pin: 20
    alias: motion_interior
    direction: input
    pull: down
    debounce_ms: 300
    ha: { name: "Interior Motion", device_class: motion }