# Site: RV — doors, engine, lights, HVAC, tanks, level + TPMS (4 tires)
#
# Pico W: typical 12 V RV I/O via level shifters/relay boards.
# Analog inputs for fresh/grey tank resistive senders (GP26-28).
# I2C accelerometer (MPU6050 @ 0x68) for pitch/roll leveling in HA.
#
#   cp examples/sites/rv.yaml config.yaml

device:
  id: rv-main
  board: picow
  profile: sensors
  ha:
    name: "RV"
    manufacturer: mqttpi
    model: picow

mqtt:
  host: 192.168.1.50
  port: 1883
  tls: false
  base_topic: mobile/rv
  client_id: mqttpi-rv-main
  homeassistant:
    discovery: true
    discovery_prefix: homeassistant
  payload_on: "ON"
  payload_off: "OFF"
  retain: true
  qos: 1

buses:
  onewire: { enabled: false, pin: 7 }
  i2c:     { enabled: true, controller: 0, sda: 0, scl: 1 }
  spi:     { enabled: false, controller: 0, sck: 2, mosi: 3, miso: 4, cs: 5 }
  i2s:     { enabled: false, bclk: 16, lrck: 17, din: 18, dout: 19 }

pwm:
  enabled: false
  pins: [8, 9, 10, 11, 12, 13, 14, 15]

mqtt_aliases:
  entry_door_contact: entry_door
  engine_running_sense: engine_running

# I2C accelerometer — spirit-level for parking setup (HA sensors + binary "level OK")
sensors:
  level:
    enabled: true
    bus: i2c
    chip: mpu6050
    address: 0x68
    mount: floor_plane
    calibration:
      mode: on_boot
      command_topic: "{base_topic}/level/calibrate"
    publish:
      interval_ms: 2000
      retain: true
    readings:
      pitch:
        alias: level_pitch
        ha:
          name: "Level Pitch"
          state_class: measurement
          unit_of_measurement: "°"
          icon: mdi:angle-acute
      roll:
        alias: level_roll
        ha:
          name: "Level Roll"
          state_class: measurement
          unit_of_measurement: "°"
          icon: mdi:angle-acute
      deviation:
        alias: level_deviation
        type: max_abs
        ha:
          name: "Level Deviation"
          state_class: measurement
          unit_of_measurement: "°"
          icon: mdi:spirit-level
      is_level:
        alias: is_level
        type: binary
        threshold_deg: 1.5
        ha:
          name: "Level OK"
          icon: mdi:check-circle
          payload_on: "ON"
          payload_off: "OFF"

  # 433 MHz TPMS receiver → UART (HA pressure/temp/low per wheel)
  tpms:
    enabled: true
    receiver:
      type: uart
      controller: 1
      tx: 8
      rx: 9
      baud: 115200
    protocol: tpms433
    pair_topic: "{base_topic}/tpms/pair"
    publish:
      retain: true
    units:
      pressure: psi
      temperature: f
    wheels:
      - sensor_id: "REPLACE_FL"
        position: fl
        alias: tpms_fl
        thresholds: { low_psi: 32, high_psi: 80 }
        ha: { name: "Tire Front Left" }
      - sensor_id: "REPLACE_FR"
        position: fr
        alias: tpms_fr
        thresholds: { low_psi: 32, high_psi: 80 }
        ha: { name: "Tire Front Right" }
      - sensor_id: "REPLACE_RL"
        position: rl
        alias: tpms_rl
        thresholds: { low_psi: 32, high_psi: 80 }
        ha: { name: "Tire Rear Left" }
      - sensor_id: "REPLACE_RR"
        position: rr
        alias: tpms_rr
        thresholds: { low_psi: 32, high_psi: 80 }
        ha: { name: "Tire Rear Right" }

pins:
  # GP0/1 reserved for I2C level sensor
  - pin: 7
    alias: entry_door
    direction: input
    pull: up
    invert: true
    debounce_ms: 50
    ha: { name: "Entry Door", device_class: door }

  - pin: 21
    alias: engine_running
    direction: input
    pull: down
    debounce_ms: 500
    ha: { name: "Engine Running", device_class: running }

  - pin: 2
    alias: slideout_extended
    direction: input
    pull: up
    debounce_ms: 100
    ha: { name: "Slideout Extended", device_class: opening }

  - pin: 3
    alias: awning_out
    direction: input
    pull: up
    debounce_ms: 100
    ha: { name: "Awning Extended", device_class: opening }

  - pin: 4
    alias: interior_main
    direction: output
    initial: false
    ha: { name: "Interior Main Lights", icon: mdi:lightbulb-group }

  - pin: 6
    alias: accent_strip
    direction: output
    initial: false
    ha: { name: "Accent Strip", icon: mdi:led-strip }

  - pin: 10
    alias: porch_light
    direction: output
    initial: false
    ha: { name: "Porch Light", icon: mdi:coach-lamp }

  - pin: 11
    alias: hvac_fan
    direction: output
    initial: false
    ha: { name: "Roof HVAC Fan", icon: mdi:fan }

  - pin: 14
    alias: hvac_cool
    direction: output
    initial: false
    ha: { name: "Roof HVAC Cool", icon: mdi:snowflake }

  - pin: 15
    alias: hvac_heat
    direction: output
    initial: false
    ha: { name: "Roof HVAC Heat", icon: mdi:fire }

  - pin: 20
    alias: propane_detector
    direction: input
    pull: down
    debounce_ms: 200
    ha: { name: "Propane Alarm", device_class: gas }

  - pin: 26
    alias: tank_fresh
    direction: analog_input
    publish: { interval_ms: 30000 }
    ha:
      name: "Fresh Tank Level"
      state_class: measurement
      unit_of_measurement: "%"
      scale: { min: 0.0, max: 100.0 }

  - pin: 27
    alias: tank_grey
    direction: analog_input
    publish: { interval_ms: 30000 }
    ha:
      name: "Grey Tank Level"
      state_class: measurement
      unit_of_measurement: "%"
      scale: { min: 0.0, max: 100.0 }

  - pin: 28
    alias: tank_black
    direction: analog_input
    publish: { interval_ms: 30000 }
    ha:
      name: "Black Tank Level"
      state_class: measurement
      unit_of_measurement: "%"
      scale: { min: 0.0, max: 100.0 }