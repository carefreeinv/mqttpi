# Site: Snowmobile Trailer — sled secure sensors, ramp heat, exterior lights
#
# Enclosed sled hauler: ramp door, sled tie-down contacts, interior heat strip.
#
#   cp examples/sites/snowmobile-trailer.yaml config.yaml

device:
  id: sled-trailer
  board: picow
  profile: sensors
  ha:
    name: "Snowmobile Trailer"
    manufacturer: mqttpi
    model: picow

mqtt:
  host: 192.168.1.50
  port: 1883
  tls: false
  base_topic: mobile/snowmobile-trailer
  client_id: mqttpi-sled-trailer
  homeassistant:
    discovery: true
    discovery_prefix: homeassistant
  payload_on: "ON"
  payload_off: "OFF"
  retain: true
  qos: 1

buses:
  onewire: { enabled: true, pin: 7 }
  i2c:     { enabled: false, controller: 0, sda: 0, scl: 1 }
  spi:     { enabled: false, controller: 0, sck: 2, mosi: 3, miso: 4, cs: 5 }
  i2s:     { enabled: false, bclk: 16, lrck: 17, din: 18, dout: 19 }

pwm:
  enabled: false
  pins: [8, 9, 10, 11, 12, 13, 14, 15]

mqtt_aliases:
  sled_1_secure: sled_front_tied
  sled_2_secure: sled_rear_tied

pins:
  - pin: 0
    alias: ramp_door
    direction: input
    pull: up
    invert: true
    debounce_ms: 50
    ha: { name: "Ramp Door", device_class: garage_door }

  - pin: 1
    alias: sled_front_tied
    direction: input
    pull: up
    debounce_ms: 100
    ha: { name: "Front Sled Secured", device_class: lock }

  - pin: 2
    alias: sled_rear_tied
    direction: input
    pull: up
    debounce_ms: 100
    ha: { name: "Rear Sled Secured", device_class: lock }

  - pin: 3
    alias: interior_light
    direction: output
    initial: false
    ha: { name: "Interior Light", icon: mdi:lightbulb }

  - pin: 4
    alias: exterior_flood
    direction: output
    initial: false
    ha: { name: "Exterior Flood", icon: mdi:car-light-high }

  - pin: 6
    alias: accent_blue
    direction: output
    initial: false
    ha: { name: "Accent Lights", icon: mdi:led-strip-variant }

  - pin: 10
    alias: ramp_heat
    direction: output
    initial: false
    ha: { name: "Ramp Heat Mat", icon: mdi:radiator }

  - pin: 11
    alias: cabin_heat_fan
    direction: output
    initial: false
    ha: { name: "Enclosed Heat Fan", icon: mdi:fan }

  - pin: 14
    alias: motion_interior
    direction: input
    pull: down
    debounce_ms: 300
    ha: { name: "Interior Motion", device_class: motion }

  - pin: 15
    alias: brake_connection
    direction: input
    pull: down
    debounce_ms: 50
    ha: { name: "Trailer Connected", device_class: connectivity }

  - pin: 20
    alias: low_temp_alert
    direction: input
    pull: down
    debounce_ms: 1000
    ha: { name: "Freeze Alert Input", device_class: cold }