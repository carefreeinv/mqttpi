# 32 relay outputs — Pico W + 4× MCP23017 I2C expanders
#
# Pico W has ~23 native GPIO — NOT enough for 32 relays. This example uses
# four MCP23017 chips (8 outputs each) on I2C0 (GP0/GP1).
#
# Hardware: 3.3 V MCP23017 modules or level-shifted relay boards per channel.
# Each relay coil must be driven via transistor/MOSFET — never from expander pin.
#
#   cp examples/relay-bank-32.yaml config.yaml

device:
  id: relay-bank-32
  board: picow
  profile: sensors
  ha:
    name: "32-Channel Relay Bank"
    manufacturer: mqttpi
    model: picow-mcp23017

mqtt:
  host: 192.168.1.50
  port: 1883
  tls: false
  base_topic: mqttpi/relay-bank-32
  client_id: mqttpi-relay-bank-32
  homeassistant:
    discovery: true
    discovery_prefix: homeassistant
  payload_on: "ON"
  payload_off: "OFF"
  retain: true
  qos: 1

buses:
  onewire: { enabled: false, pin: 7 }
  i2c:     { enabled: true, controller: 0, sda: 0, scl: 1 }
  spi:     { enabled: false, controller: 0, sck: 2, mosi: 3, miso: 4, cs: 5 }
  i2s:     { enabled: false, bclk: 16, lrck: 17, din: 18, dout: 19 }

pwm:
  enabled: false
  pins: [8, 9, 10, 11, 12, 13, 14, 15]

# Four MCP23017 at 0x20–0x23 → 32 open-drain/output channels
expanders:
  mcp23017:
    enabled: true
    bus: i2c
    chips:
      - address: 0x20
        alias: bank_a
      - address: 0x21
        alias: bank_b
      - address: 0x22
        alias: bank_c
      - address: 0x23
        alias: bank_d

mqtt_aliases: {}

# Channels: expander address + port A/B pin 0-7 (implementation maps to GPA/GPB)
pins:
  - expander: { chip: 0x20, pin: 0 }
    alias: relay_01
    direction: output
    initial: false
    ha: { name: "Relay 01" }
  - expander: { chip: 0x20, pin: 1 }
    alias: relay_02
    direction: output
    initial: false
    ha: { name: "Relay 02" }
  - expander: { chip: 0x20, pin: 2 }
    alias: relay_03
    direction: output
    initial: false
    ha: { name: "Relay 03" }
  - expander: { chip: 0x20, pin: 3 }
    alias: relay_04
    direction: output
    initial: false
    ha: { name: "Relay 04" }
  - expander: { chip: 0x20, pin: 4 }
