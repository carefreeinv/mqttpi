    direction: output
    initial: false
    ha: { name: "Relay 05" }
  - expander: { chip: 0x20, pin: 5 }
    alias: relay_06
    direction: output
    initial: false
    ha: { name: "Relay 06" }
  - expander: { chip: 0x20, pin: 6 }
