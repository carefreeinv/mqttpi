# 32 relay outputs via 2× MCP23017 I2C GPIO expanders (16 GPIO per chip).
# Pico W: I2C0 on GP0 (SDA) + GP1 (SCL). Native GPIO stays free for inputs/sensors.
# Each MCP23017 adds 16 outputs (PORTA 0–7 + PORTB 8–15); two chips = 32 relays.
# See relay-bank-32.md for wiring, power, and HA discovery.

board: pico_w
profile: maximum_gpio

device:
  id: relay-bank-32
  name: Relay Bank 32
  manufacturer: mqttpi
  model: MCP23017×2

mqtt:
  broker:
    host: mqtt.local
    port: 1883
  base_topic: mqttpi/relay-bank-32
  homeassistant:
    discovery: true

i2c:
  enabled: true
  bus: 0
  sda: 0
  scl: 1
  frequency_hz: 400000

expanders:
  mcp23017:
    enabled: true
    chips:
      - address: 0x20
        reset_pin: null
      - address: 0x21
        reset_pin: null

pins:
  # MCP23017 @ 0x20 — relays 1–16 (pins 0–15)
  - alias: relay_01
    direction: output
    default: false
    homeassistant:
      name: Relay 01
      device_class: switch
    expander: { chip: 0x20, pin: 0 }
  - alias: relay_02
    direction: output
    default: false
    homeassistant:
      name: Relay 02
      device_class: switch
    expander: { chip: 0x20, pin: 1 }
