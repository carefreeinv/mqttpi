# PWM bank — HA number entities on GP8-GP11
#
#   cp examples/pwm-bank.yaml config.yaml
#
# pwm_output maps to HA number (0-100). Servos use servo-controller.yaml instead.

device:
  id: pwm-bank-01
  board: picow
  profile: pwm_only
  ha:
    name: "PWM Bank"

mqtt:
  host: 192.168.1.50
  port: 1883
  tls: false
  base_topic: mqttpi/pwm-bank-01
  client_id: mqttpi-pwm-bank-01
  homeassistant:
    discovery: true
    discovery_prefix: homeassistant
  retain: true
  qos: 1

buses:
  onewire: { enabled: false, pin: 7 }
  i2c:     { enabled: false, controller: 0, sda: 0, scl: 1 }
  spi:     { enabled: false, controller: 0, sck: 2, mosi: 3, miso: 4, cs: 5 }
  i2s:     { enabled: false, bclk: 16, lrck: 17, din: 18, dout: 19 }

pwm:
  enabled: true
  pins: [8, 9, 10, 11, 12, 13, 14, 15]

mqtt_aliases: {}

pins:
  - pin: 8
    alias: pwm_ch1
    direction: pwm_output
    frequency_hz: 1000
    initial_duty: 0
    ha:
      name: "PWM Channel 1"
      min: 0
      max: 100
      step: 1
      unit_of_measurement: "%"

  - pin: 9
    alias: pwm_ch2
    direction: pwm_output
    frequency_hz: 1000
    initial_duty: 0
    ha:
      name: "PWM Channel 2"
      min: 0
      max: 100
      step: 1
      unit_of_measurement: "%"

  - pin: 10
    alias: pwm_ch3
    direction: pwm_output
    frequency_hz: 25000
    initial_duty: 0
    ha:
      name: "PWM Channel 3"
      min: 0
      max: 100
      step: 1
      unit_of_measurement: "%"

  - pin: 11
    alias: pwm_ch4
    direction: pwm_output
    frequency_hz: 25000
    initial_duty: 0
    ha:
      name: "PWM Channel 4"
      min: 0
      max: 100
      step: 1
      unit_of_measurement: "%"