# Maximum GPIO — empty HA-ready template (Pico W)
#
#   cp examples/maximum-gpio.yaml config.yaml
#
# All peripherals disabled. 23 pins available. Add pins[] as needed;
# entity type is inferred: output→switch, input→binary_sensor, etc.

device:
  id: pico-node-01
  board: picow
  profile: maximum_gpio
  ha:
    name: "Pico Node 01"

mqtt:
  host: 192.168.1.50
  port: 1883
  tls: false
  base_topic: mqttpi/pico-node-01
  client_id: mqttpi-pico-node-01
  homeassistant:
    discovery: true
    discovery_prefix: homeassistant
  payload_on: "ON"
  payload_off: "OFF"
  retain: true
  qos: 1

buses:
  onewire: { enabled: false, pin: 7 }
  i2c:     { enabled: false, controller: 0, sda: 0, scl: 1 }
  spi:     { enabled: false, controller: 0, sck: 2, mosi: 3, miso: 4, cs: 5 }
  i2s:     { enabled: false, bclk: 16, lrck: 17, din: 18, dout: 19 }

pwm:
  enabled: false
  pins: [8, 9, 10, 11, 12, 13, 14, 15]

mqtt_aliases: {}

pins: []