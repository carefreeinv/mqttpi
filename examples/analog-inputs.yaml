# Analog inputs — HA sensor entities on GP26-GP28
#
#   cp examples/analog-inputs.yaml config.yaml
#
# Publishes normalized 0.0-1.0 (implementation may scale via ha.scale).

device:
  id: analog-01
  board: picow
  profile: maximum_gpio
  ha:
    name: "Analog Sensors"

mqtt:
  host: 192.168.1.50
  port: 1883
  tls: false
  base_topic: mqttpi/analog-01
  client_id: mqttpi-analog-01
  homeassistant:
    discovery: true
    discovery_prefix: homeassistant
  retain: true
  qos: 1

buses:
  onewire: { enabled: false, pin: 7 }
  i2c:     { enabled: false, controller: 0, sda: 0, scl: 1 }
  spi:     { enabled: false, controller: 0, sck: 2, mosi: 3, miso: 4, cs: 5 }
  i2s:     { enabled: false, bclk: 16, lrck: 17, din: 18, dout: 19 }

pwm:
  enabled: false
  pins: [8, 9, 10, 11, 12, 13, 14, 15]

mqtt_aliases: {}

pins:
  - pin: 26
    alias: sensor_a0
    direction: analog_input
    publish:
      interval_ms: 5000
    ha:
      name: "Analog A0"
      device_class: voltage
      state_class: measurement
      unit_of_measurement: "V"
      scale:
        min: 0.0
        max: 3.3

  - pin: 27
    alias: sensor_a1
    direction: analog_input
    publish:
      interval_ms: 5000
    ha:
      name: "Analog A1"
      device_class: voltage
      state_class: measurement
      unit_of_measurement: "V"
      scale:
        min: 0.0
        max: 3.3

  - pin: 28
    alias: sensor_a2
    direction: analog_input
    publish:
      interval_ms: 5000
    ha:
      name: "Analog A2"
      device_class: voltage
      state_class: measurement
      unit_of_measurement: "V"
      scale:
        min: 0.0
        max: 3.3