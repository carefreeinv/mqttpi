<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="mqttpi">
  <title>mqttpi</title>
  <!-- MQTT signal arcs -->
  <path d="M4 22 C4 15, 9 11, 13 14" fill="none" stroke="#e8a838" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M4 22 C4 10, 13 5, 13 14" fill="none" stroke="#e8a838" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- π top bar (extends from signal) -->
  <path d="M13 14 H35" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- π legs -->
  <path d="M19 14 V34" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <path d="M29 14 V34" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- GPIO pin pads -->
  <circle cx="19" cy="38" r="2" fill="#e8a838"/>
  <circle cx="29" cy="38" r="2" fill="#e8a838"/>
  <circle cx="37" cy="38" r="2" fill="#e8a838"/>
</svg>